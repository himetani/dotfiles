# -------------------------------------------------------------------
# Session options
# -------------------------------------------------------------------

# Cursor motion in tmux command prompt (prefix + :)
set -g status-keys emacs

# Mouse mode on
set -g mouse on

# Faster command sequence
set -s escape-time 0

# Scrollback buffer
set -g history-limit 50000

# Save tmux command prompt history
set -g history-file ~/.tmux_history

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{b:pane_current_path} #W #F"
set -g @catppuccin_window_current_text " #{b:pane_current_path} #W #F"

set -g focus-events on

# True color
# Use tmux-256color for accurate terminfo definitions (italic, undercurl, etc.)
set -g default-terminal "tmux-256color"
# Tell tmux that Ghostty (TERM=xterm-ghostty) supports 24-bit true color
set -sa terminal-overrides ",xterm-ghostty:RGB"

# -------------------------------------------------------------------
# Window options
# -------------------------------------------------------------------
# Copy-mode
set-window-option -g mode-keys vi

# -------------------------------------------------------------------
# Key bindings
# -------------------------------------------------------------------
# Change bind key to ctrl-j
unbind-key c-b
set-option -g prefix c-j
bind-key C-j send-prefix

# Double tapping the prefix jumps to last window
unbind-key c  ; bind-key C-j last-window

# Choose session
bind-key C-s choose-session

# Window control
bind-key n new-window

# Pane control
# Split horiziontal and vertical splits. open them in the same directory
bind-key d split-window -h -c '#{pane_current_path}'
bind-key C-d split-window -v -c '#{pane_current_path}'

# Disable confirm before killing
bind-key x kill-pane

# Add a key binding for reloading our configuration
bind-key C-r source-file ~/.tmux.conf \; display "Reloaded!"

# Toggle status bar
bind-key G set status

# Copy & Paste 
bind-key -T edit-mode-vi Up send-keys -X history-up
bind-key -T edit-mode-vi Down send-keys -X history-down
unbind-key -T copy-mode-vi Space     ;   bind-key -T copy-mode-vi v send-keys -X begin-selection
unbind-key -T copy-mode-vi Enter     ;   bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
unbind-key -T copy-mode-vi ]         ;   bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
unbind-key ]                         ;   bind-key C-p paste-buffer
unbind-key [                         ;   bind-key C-v copy-mode

# Equally resize all panes
bind-key = select-layout even-horizontal
bind-key | select-layout even-vertical

# Resize panes
bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key H resize-pane -L 10
bind-key L resize-pane -R 10

# Pane-movement
bind-key h select-pane -L
bind-key l select-pane -R
bind-key j select-pane -D
bind-key k select-pane -U
bind-key tab select-pane -t :.+
bind-key btab select-pane -t :.-

# synchronized panes
bind * set-window-option synchronize-panes

# Load catppuccin before status bar configuration
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# -------------------------------------------------------------------
# Status bar
# -------------------------------------------------------------------
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run '~/.tmux/plugins/tpm/tpm'
